<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Pay Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: linear-gradient(135deg, #74ebd5, #9face6); 
      display: flex; 
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #fff; 
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
      text-align: center;
      width: 350px; 
    }

    h2 {
      color: #2c3e50; 
      margin-top: 0;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 20px;
      margin-bottom: 8px;
      text-align: left;
    }

    input[type="number"], select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box; 
    }

    input:focus, select:focus {
      outline: none;
      border-color: #3498db;
    }

    button {
      background-color: #3498db;
      color: #fff;
      padding: 12px 20px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2980b9;
    }

    #computationResult {
      margin-top: 25px;
      padding: 15px;
      background-color: #f8f9fa;
      border-radius: 8px;
      text-align: left;
      font-size: 15px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Pay Calculator</h2>

    <div class="section-title">Income</div>
    <input type="number" id="monthlyIncome" placeholder="Enter Monthly Income (₱)" min="0">

    <div class="section-title">Deductions</div>
    <input type="number" id="sss" placeholder="SSS Contribution (₱)" min="0"> 
    <input type="number" id="philhealth" placeholder="PhilHealth Contribution (₱)" min="0">
    <input type="number" id="pagibig" placeholder="Pag-IBIG Contribution (₱)" min="0">

    <button onclick="calculateNetPay()">Compute Total</button>
    
    <div id="computationResult">
      Enter amounts above and click compute.
    </div>
  </div>

  <script>
    function calculateNetPay() { 
      const income = parseFloat(document.getElementById("monthlyIncome").value) || 0;
      const sss = parseFloat(document.getElementById("sss").value) || 0;
      const philhealth = parseFloat(document.getElementById("philhealth").value) || 0;
      const pagibig = parseFloat(document.getElementById("pagibig").value) || 0;

      const totalDeductions = sss + philhealth + pagibig;
      const netPay = income - totalDeductions;
      
      document.getElementById("computationResult").innerHTML = `
        <strong>Total Deductions:</strong> ₱${totalDeductions.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}<br>
        <strong>Net Pay:</strong> ₱${netPay.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
      `;
    }
  </script>
</body>
</html>
