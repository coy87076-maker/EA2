<!DOCTYPE html>
<html>
<head>
  <title>Simple Pay Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif; 
      background: linear-gradient(to right, #74ebd5, #9face6); 
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #fff; 
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(255, 0, 0, 0.8); /*red, green, blue, opacity.*/
      text-align: center;
      width: 320px; 
    }

    h2 {
      color: #0000ff; /*red, green, blue*/
      margin-bottom: 20px;
    }

    input[type="number"] {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      background-color: #3498db;
      color: #fff;
      padding: 10px 16px;
      margin: 8px 6px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2c3e50;
    }

    h3 {
      color: #222;
      margin-top: 25px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="container">
           <h2>Simple Calculator</h2>


           <input type="number" id="Monthly" placeholder="Enter Monthly Income">
           <h3>SSS Membership</h3>
      
           <select id="sssMembership">
                        <option>Employed</option>
                        <option>Self-employed</option>
                        <option>Household Employer and Kasambahay</option>
                        <option>Voluntary and Non-working Space</option>
                        <option>Overseas Filipino Worker</option>
                        <option>Not a member</option>
            </select>
            <h3>PhilHealth Membership</h3>
      
           <select id="philhealthMembership">
                        <option>Individually paying</option>
                        <option>Not a member</option>
            </select>
            <h3>Pag-IBIG Membership</h3>
      
           <select id="pag-ibigMembership">
                        <option>Individually paying</option>
                        <option>Not a member</option>
            </select>
    </select>

           <h2>Monthly Contributions</h2>
           <input type="number" id="Sss" placeholder="SSS"> 
           <input type="number" id="PhilHealth" placeholder="PhilHealth">
           <input type="number" id="Pag" placeholder="Pag-IBIG">
           <br>
           

          
    <h3 id="result"></h3>

  </div>

         `;

  </script>
</body>
</html>
